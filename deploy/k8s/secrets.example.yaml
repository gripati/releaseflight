# EXAMPLE only — copy to secrets.yaml, fill the real values, and apply via
#   kubectl apply -f deploy/k8s/secrets.yaml -n marquee
# Real secrets MUST come from your secret manager (AWS SM, Vault, sealed-
# secrets, External Secrets Operator). Never commit a populated version.
apiVersion: v1
kind: Secret
metadata:
  name: gp-web-env
  namespace: marquee
type: Opaque
stringData:
  DATABASE_URL: postgresql://gp:CHANGE_ME@postgres:5432/gamepublisher?connection_limit=10
  DIRECT_URL: postgresql://gp:CHANGE_ME@postgres:5432/gamepublisher
  REDIS_URL: redis://redis:6379
  SESSION_SECRET: CHANGE_ME_min_32_chars_required_for_hmac_signing
  STORAGE_SIGNING_SECRET: CHANGE_ME_to_a_random_32_char_string
  S3_ACCESS_KEY_ID: CHANGE_ME
  S3_SECRET_ACCESS_KEY: CHANGE_ME
  METRICS_BEARER_TOKEN: CHANGE_ME_at_least_16_chars
  SENTRY_DSN: ""
