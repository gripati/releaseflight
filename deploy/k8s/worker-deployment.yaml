apiVersion: apps/v1
kind: Deployment
metadata:
  name: gp-worker
  namespace: marquee
  labels:
    app.kubernetes.io/name: gp-worker
    app.kubernetes.io/part-of: marquee
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gp-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gp-worker
        app.kubernetes.io/part-of: marquee
        app.kubernetes.io/component: worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          # Pin to an immutable release tag, never :latest (CD should set a
          # version or @sha256 digest). See web-deployment.yaml.
          image: ghcr.io/gripati/gp-worker:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9091
          envFrom:
            - configMapRef:
                name: gp-web-config
            - secretRef:
                name: gp-web-env
          env:
            - name: WORKER_CONCURRENCY
              value: "4"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: secrets-data
              mountPath: /data/secrets
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 4Gi }
        - name: secrets-data
          persistentVolumeClaim:
            claimName: gp-secrets-pvc
            readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: gp-worker-metrics
  namespace: marquee
  labels:
    app.kubernetes.io/name: gp-worker
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gp-worker
  ports:
    - name: metrics
      port: 9091
      targetPort: metrics
