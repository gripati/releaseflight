# GamePublisher — Nginx reverse proxy (development)
# Used when running stack via docker compose with TLS termination

events { worker_connections 1024; }

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  client_max_body_size 600M;       # AAB/IPA uploads
  proxy_read_timeout 1800s;        # 30 min for large uploads
  proxy_send_timeout 1800s;
  proxy_buffering off;             # SSE friendly

  upstream web { server web:3000; }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        "upgrade";
    }

    # SSE long-lived connections
    location ~ ^/api/v1/jobs/.*/stream$ {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      chunked_transfer_encoding off;
      proxy_buffering off;
      proxy_cache off;
    }
  }
}
