# Release Flight — local development stack
# Run: docker compose up -d
# Tear down: docker compose down -v
#
# Note: POSTGRES_DB + MinIO bucket name keep the `gamepublisher` label
# from the project's earlier identity so existing dev volumes keep
# working without a destructive recreate. The application name is
# Release Flight everywhere users see it.

name: marquee

services:
  postgres:
    image: postgres:16-alpine
    container_name: gp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gp
      POSTGRES_PASSWORD: gp_dev_password
      POSTGRES_DB: gamepublisher
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gp -d gamepublisher"]
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c log_min_duration_statement=200

  redis:
    image: redis:7-alpine
    container_name: gp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: gp-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: gp_dev_minio
      MINIO_ROOT_PASSWORD: gp_dev_minio_secret
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot job: create the bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: gp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 gp_dev_minio gp_dev_minio_secret;
      mc mb --ignore-existing local/gamepublisher;
      mc anonymous set download local/gamepublisher/public;
      echo 'MinIO bucket initialised.';
      "

  mailhog:
    # For SaaS email development; not used by self_host by default
    image: mailhog/mailhog:latest
    container_name: gp-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres-data:
  redis-data:
  minio-data:
