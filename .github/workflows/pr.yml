name: PR

on:
  pull_request:
    branches: [main]
  # Not on push to main: this repo is pushed to directly, and the integration
  # suite needs services/secrets not wired in CI yet. Run the full suite on PRs
  # (or via workflow_dispatch) to avoid noise on every direct push.
  workflow_dispatch:

env:
  NODE_VERSION: 22
  PNPM_VERSION: 9

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from root package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm lint
      - run: pnpm typecheck

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from root package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm test:unit

  integration:
    name: Integration Tests (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gp
          POSTGRES_PASSWORD: gp_test
          POSTGRES_DB: gp_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U gp"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://gp:gp_test@localhost:5432/gp_test?schema=public
      DIRECT_URL: postgresql://gp:gp_test@localhost:5432/gp_test?schema=public
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci-test-secret-min-32-chars-long-enough
      DEPLOY_MODE: self_host
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version from root package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm db:migrate:deploy
      - run: pnpm test:integration

  security:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4 # version from root package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: npm audit (high+)
        run: pnpm audit --prod --audit-level=high || true
